<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>OceanLeans | Official Site</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav id="main-nav" class="container">
            <a href="#home" class="logo-link">
                <img src="images/logo.png" alt="OceanLeans Logo" class="logo">
            </a>

            <input type="checkbox" id="nav-toggle" class="nav-toggle">
            <label for="nav-toggle" class="nav-toggle-label">
                <span></span>
            </label>
            
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#store">Store</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>

            <form class="subscribe-form" action="YOUR_ESP_ACTION_URL_HERE" method="post">
                <input type="email" name="EMAIL" placeholder="Email Address" required>
                <button type="submit">Join</button>
            </form>
        </nav>
    </header>

    <main id="content-wrapper">
        <section class="hero-banner" id="home">
            <div class="hero-content">
                <h1><i><b>lean</b> into</i> <b>ocean.</b></h1>
                <h2>#oceanrap</h2>
                <a href="#music-section" class="btn-listen">Listen Now</a>
            </div>
        </section>

<section id="music-section" class="container">
    <h2 class="section-title">Latest Releases</h2>
    
    <div id="loading-spinner" class="spinner-container">
        <div class="spinner"></div>
        <p>Fetching...</p>
    </div>
    
    <div class="album-grid" id="dynamic-album-grid">
        </div>
</section>

<div id="streaming-modal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-button" onclick="closeModal()">&times;</span>
        <img id="modal-album-art" src="" alt="Album Art">
        <h3 id="modal-album-title">Album Title</h3>
        <div class="streaming-links">
            <a href="#" id="link-spotify" target="_blank" class="stream-link">Spotify</a>
            <a href="#" id="link-apple" target="_blank" class="stream-link">Apple Music</a>
            <a href="#" id="link-youtube" target="_blank" class="stream-link">YouTube</a>
        </div>
    </div>
</div>
    </main>

    <footer>
        <p>&copy; 2026 OceanLeans</p>
    </footer>
    <script src="script.js"></script> 
</body>
</html>
