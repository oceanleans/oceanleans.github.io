<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OceanLeans | Contact</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@100..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body class="contact-body">
  <header>
    <nav id="main-nav">
      <a href="index.html" class="logo-link" aria-label="Go to the OceanLeans home page">
        <img src="assets/logo/Oceanleans Round Logo 2.png" alt="OceanLeans Logo" class="logo">
      </a>
    </nav>
  </header>

  <main class="contact-page">
    <section class="contact-shell">
      <section class="contact-form-card" aria-labelledby="contact-heading">
        <h1 id="contact-heading">Contact</h1>

        <form class="contact-form">
          <label class="contact-field">
            <span>Name</span>
            <input type="text" name="name" placeholder="Your name" required>
          </label>

          <label class="contact-field">
            <span>Email</span>
            <input type="email" name="email" placeholder="you@example.com" required>
          </label>

          <label class="contact-field">
            <span>Message</span>
            <textarea name="message" rows="6" placeholder="Write your message here..." required></textarea>
          </label>

          <button type="submit" class="contact-submit">Send</button>
        </form>
      </section>
    </section>
  </main>

  <footer class="page-footer subpage-page2-footer">
    <div class="footer-socials" aria-label="Social media links">
      <a href="https://www.youtube.com/@OceanLeans/videos" class="footer-social-link" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
        <i class="fa-brands fa-youtube" aria-hidden="true"></i>
        <span class="sr-only">YouTube</span>
      </a>
      <a href="https://www.tiktok.com/@oceanleans" class="footer-social-link" target="_blank" rel="noopener noreferrer" aria-label="TikTok">
        <i class="fa-brands fa-tiktok" aria-hidden="true"></i>
        <span class="sr-only">TikTok</span>
      </a>
      <a href="https://www.instagram.com/oceanleans/" class="footer-social-link" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <i class="fa-brands fa-instagram" aria-hidden="true"></i>
        <span class="sr-only">Instagram</span>
      </a>
      <a href="https://www.facebook.com/profile.php?id=61563285745056" class="footer-social-link" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <i class="fa-brands fa-facebook-f" aria-hidden="true"></i>
        <span class="sr-only">Facebook</span>
      </a>
    </div>
    <p class="footer-legal">&copy; 2026 OceanLeans. All rights reserved.</p>
    <a href="privacy.html" class="footer-policy-link">Privacy Policy</a>
  </footer>
</body>
</html>
